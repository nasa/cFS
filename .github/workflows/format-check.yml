name: Format Check

on:
  workflow_call:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:

# Force bash to apply pipefail option so pipeline failures aren't masked
defaults:
  run:
    shell: bash

jobs:
  #Checks for duplicate actions. Skips push actions if there is a matching or duplicate pull-request action.
  check-for-duplicates:
    runs-on: ubuntu-latest
    # Map a step output to a job output
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@master
        with:
          concurrent_skipping: 'same_content'
          skip_after_successful_duplicate: 'true'
          do_not_skip: '["pull_request", "workflow_dispatch", "schedule"]'

  format-checker:
    name: Run format check
    #Continue if check-for-duplicates found no duplicates. Always runs for pull-requests.
    needs: check-for-duplicates
    if: ${{ needs.check-for-duplicates.outputs.should_skip != 'true' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    container: ghcr.io/core-flight-system/cfsbuildenv-linux:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: repo

      - name: Get style from bundle
        run: curl -fsL ${{ github.server_url }}/nasa/cFS/raw/refs/heads/dev/.clang-format > $GITHUB_WORKSPACE/clang-format.yml

      - name: Check configuration
        run: clang-format-19 -style=file:$GITHUB_WORKSPACE/clang-format.yml --dump-config

      - name: Execute clang-format
        run: find ./repo -type f -name "*.[ch]" -print0 | xargs -0 clang-format-19 -style=file:$GITHUB_WORKSPACE/clang-format.yml -i

      - name: Check for differences
        run: (cd repo && git diff --exit-code HEAD) | tee $GITHUB_WORKSPACE/style_differences.txt

      # If there are no diffs, this will be a 0 byte file and no need to archive it
      # Otherwise if there was a failure the file should be non-empty
      - name: Archive difference artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: style_differences
          path: style_differences.txt

  check-commit-message:
    name: Check Commit Message
    # Only run for pull-requests.
    if: ${{ github.event_name == 'pull_request' && !startsWith(github.head_ref, 'ic-') }}
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      # Check each commit message associated with the pull-request against the pattern.
      - name: Check each commit message
        uses: gsactions/commit-message-checker@v2
        if: always()
        with:
          pattern: '^((Fix|HotFix|Part|Issue|Ticket)\s(nasa/)?[a-zA-Z]*\#[0-9]+[,:]\s[a-zA-Z0-9]+|Merge\spull\srequest\s\#[0-9]+\s[a-zA-Z0-9]+|IC:\s[a-zA-Z0-9]+)'
          error: 'You need at least one "Fix|HotFix|Part|Issue|Ticket #<issue number><,|:> <short description>" line in the commit message.'
          excludeDescription: 'true'
          excludeTitle: 'true'
          checkAllCommitMessages: 'true'
          accessToken: ${{ secrets.GITHUB_TOKEN }}
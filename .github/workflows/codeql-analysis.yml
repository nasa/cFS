name: "CodeQL Analysis: cFS-Bundle"

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:

jobs:
  codeql:
    uses: ./.github/workflows/codeql-reusable.yml
    with:
      component-path: cFS
      prep: make native_std.prep
      make: make native_std.install
      test: true
